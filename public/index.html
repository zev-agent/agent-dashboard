<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        bg: '#0a0e1a',
        surface: '#12151f',
        'surface-el': '#1a1f2e',
        accent: '#00d4ff',
        'text-pri': '#f1f5f9',
        'text-sec': '#8b9cb7',
        success: '#2dd4bf',
        danger: '#f43f5e',
        warning: '#fbbf24',
        border: 'rgba(0,212,255,0.08)',
      },
      fontFamily: {
        mono: ['JetBrains Mono', 'monospace'],
      }
    }
  }
}
</script>
<style>
  body { background: #0a0e1a; font-family: 'JetBrains Mono', monospace; }
  .glow { text-shadow: 0 0 8px rgba(0,212,255,0.4); }
  .card { background: #12151f; border: 1px solid rgba(0,212,255,0.08); }
  .card-el { background: #1a1f2e; border: 1px solid rgba(0,212,255,0.08); }
  .pulse-dot { animation: pulse-ring 2s ease-in-out infinite; }
  @keyframes pulse-ring {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .status-running { color: #2dd4bf; }
  .status-idle { color: #8b9cb7; }
  .status-offline { color: #f43f5e; }
  .ci-success { color: #2dd4bf; }
  .ci-failure { color: #f43f5e; }
  .ci-pending { color: #fbbf24; }
  .ci-in-progress { color: #00d4ff; }
  .queue-active { border-left: 3px solid #00d4ff; background: rgba(0,212,255,0.05); }
  .queue-merged { border-left: 3px solid #2dd4bf; opacity: 0.6; }
  .queue-queued { border-left: 3px solid rgba(0,212,255,0.08); }
  .scroll-fade { mask-image: linear-gradient(to bottom, black 90%, transparent 100%); }
</style>
</head>
<body class="text-text-pri min-h-screen">

<div class="max-w-7xl mx-auto px-4 py-6">
  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <div class="w-2 h-2 rounded-full bg-accent pulse-dot"></div>
      <h1 class="text-xl font-bold text-accent glow tracking-wide">AGENT DASHBOARD</h1>
    </div>
    <div class="flex items-center gap-4 text-xs text-text-sec">
      <span id="last-update">—</span>
      <span id="poll-indicator" class="w-1.5 h-1.5 rounded-full bg-text-sec inline-block"></span>
    </div>
  </div>

  <!-- Agent Status Panel -->
  <div class="card rounded-lg p-4 mb-4">
    <h2 class="text-xs font-semibold text-text-sec uppercase tracking-widest mb-3">Agents</h2>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="text-text-sec text-xs uppercase tracking-wider">
            <th class="text-left py-2 pr-4">Agent</th>
            <th class="text-left py-2 pr-4">Status</th>
            <th class="text-left py-2 pr-4">Task</th>
            <th class="text-left py-2 pr-4">Runtime</th>
            <th class="text-left py-2">Updated</th>
          </tr>
        </thead>
        <tbody id="agents-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Usage & Cost Panel -->
  <div id="usage-panel" class="card rounded-lg p-4 mb-4" style="display:none;">
    <h2 class="text-xs font-semibold text-text-sec uppercase tracking-widest mb-3">API Usage & Cost</h2>
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
      <div class="card-el rounded-lg p-3 text-center">
        <div class="text-[10px] uppercase tracking-wider text-text-sec mb-1">Today's Cost</div>
        <div id="cost-today" class="text-xl font-bold text-accent">—</div>
      </div>
      <div class="card-el rounded-lg p-3 text-center">
        <div class="text-[10px] uppercase tracking-wider text-text-sec mb-1">7-Day Cost</div>
        <div id="cost-week" class="text-xl font-bold text-accent">—</div>
      </div>
      <div class="card-el rounded-lg p-3 text-center">
        <div class="text-[10px] uppercase tracking-wider text-text-sec mb-1">Today's Tokens</div>
        <div class="flex justify-center gap-3 mt-0.5">
          <div>
            <span class="text-[10px] text-text-sec">IN </span>
            <span id="tokens-today-in" class="text-sm font-semibold text-text-pri">—</span>
          </div>
          <div>
            <span class="text-[10px] text-text-sec">OUT </span>
            <span id="tokens-today-out" class="text-sm font-semibold text-text-pri">—</span>
          </div>
        </div>
      </div>
      <div class="card-el rounded-lg p-3 text-center">
        <div class="text-[10px] uppercase tracking-wider text-text-sec mb-1">7-Day Tokens</div>
        <div class="flex justify-center gap-3 mt-0.5">
          <div>
            <span class="text-[10px] text-text-sec">IN </span>
            <span id="tokens-week-in" class="text-sm font-semibold text-text-pri">—</span>
          </div>
          <div>
            <span class="text-[10px] text-text-sec">OUT </span>
            <span id="tokens-week-out" class="text-sm font-semibold text-text-pri">—</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
    <!-- Queue View -->
    <div class="card rounded-lg p-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-xs font-semibold text-text-sec uppercase tracking-widest">Task Queue</h2>
        <button id="toggle-completed" class="text-xs text-text-sec hover:text-accent transition-colors cursor-pointer">
          Show completed
        </button>
      </div>
      <div id="queue-list" class="space-y-1 max-h-[420px] overflow-y-auto scroll-fade"></div>
    </div>

    <!-- PR Tracker -->
    <div class="card rounded-lg p-4">
      <h2 class="text-xs font-semibold text-text-sec uppercase tracking-widest mb-3">Open PRs</h2>
      <div id="pr-list" class="space-y-2 max-h-[420px] overflow-y-auto scroll-fade"></div>
    </div>
  </div>
</div>

<script>
const POLL_INTERVAL = 7000;
let showCompleted = false;

function timeAgo(dateStr) {
  if (!dateStr) return '—';
  const now = new Date();
  const then = new Date(dateStr);
  const diffMs = now - then;
  if (diffMs < 0) return 'just now';
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ' + (mins % 60) + 'm ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

function runtime(startedAt) {
  if (!startedAt) return '—';
  const now = new Date();
  const start = new Date(startedAt);
  const diffMs = now - start;
  if (diffMs < 0) return '—';
  const mins = Math.floor(diffMs / 60000);
  if (mins < 60) return mins + 'm';
  const hrs = Math.floor(mins / 60);
  return hrs + 'h ' + (mins % 60) + 'm';
}

function capitalize(s) {
  return s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
}

function statusDot(status) {
  const cls = 'status-' + status;
  const dot = status === 'running' ? 'pulse-dot' : '';
  return `<span class="inline-flex items-center gap-1.5">
    <span class="w-1.5 h-1.5 rounded-full ${cls === 'status-running' ? 'bg-success' : cls === 'status-idle' ? 'bg-text-sec' : 'bg-danger'} ${dot}"></span>
    <span class="${cls} text-xs font-medium">${capitalize(status)}</span>
  </span>`;
}

function ciIcon(checks) {
  if (!checks || checks.length === 0) return '<span class="text-text-sec text-xs">—</span>';
  const total = checks.length;
  const passed = checks.filter(c => c.conclusion === 'SUCCESS').length;
  const failed = checks.filter(c => c.conclusion === 'FAILURE').length;
  const pending = checks.filter(c => c.status === 'QUEUED' || c.status === 'IN_PROGRESS').length;

  if (failed > 0) return `<span class="ci-failure text-xs font-medium">${failed}/${total} failed</span>`;
  if (pending > 0) return `<span class="ci-in-progress text-xs font-medium">${passed}/${total} running</span>`;
  if (passed === total) return `<span class="ci-success text-xs font-medium">${total}/${total} passed</span>`;
  return `<span class="ci-pending text-xs font-medium">${passed}/${total}</span>`;
}

function queueStatusBadge(status) {
  const map = {
    'implementing': ['bg-accent/20 text-accent', 'In Progress'],
    'pr_open': ['bg-accent/20 text-accent', 'PR Open'],
    'planning': ['bg-warning/20 text-warning', 'Planning'],
    'queued': ['bg-text-sec/10 text-text-sec', 'Queued'],
    'merged': ['bg-success/20 text-success', 'Merged'],
    'done': ['bg-success/20 text-success', 'Done'],
    'blocked': ['bg-danger/20 text-danger', 'Blocked'],
  };
  const [cls, label] = map[status] || ['bg-text-sec/10 text-text-sec', status];
  return `<span class="text-[10px] px-1.5 py-0.5 rounded ${cls} font-medium">${label}</span>`;
}

function renderAgents(agents) {
  const tbody = document.getElementById('agents-tbody');
  if (!agents || agents.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="text-text-sec text-xs py-4">No agent data</td></tr>';
    return;
  }
  tbody.innerHTML = agents.map(a => `
    <tr class="border-t border-border">
      <td class="py-2.5 pr-4 font-semibold text-text-pri">${capitalize(a.name)}</td>
      <td class="py-2.5 pr-4">${statusDot(a.status)}</td>
      <td class="py-2.5 pr-4 text-xs text-text-sec max-w-[280px] truncate">${a.description || '—'}</td>
      <td class="py-2.5 pr-4 text-xs text-text-sec">${a.status === 'running' ? runtime(a.started_at) : '—'}</td>
      <td class="py-2.5 text-xs text-text-sec">${a.started_at ? timeAgo(a.started_at) : '—'}</td>
    </tr>
  `).join('');
}

function renderQueue(queue) {
  const container = document.getElementById('queue-list');
  if (!queue || queue.length === 0) {
    container.innerHTML = '<div class="text-text-sec text-xs py-4">No queue data</div>';
    return;
  }

  const active = queue.filter(q => ['implementing', 'pr_open', 'planning'].includes(q.status));
  const queued = queue.filter(q => q.status === 'queued');
  const completed = queue.filter(q => ['merged', 'done'].includes(q.status));

  let items = [...active, ...queued.slice(0, 5)];
  if (showCompleted) items = [...items, ...completed];

  container.innerHTML = items.map(q => {
    let rowClass = 'queue-queued';
    if (['implementing', 'pr_open', 'planning'].includes(q.status)) rowClass = 'queue-active';
    if (['merged', 'done'].includes(q.status)) rowClass = 'queue-merged';

    const prLink = q.pr
      ? `<a href="https://github.com/${q.repo}/pull/${q.pr}" target="_blank" class="text-accent hover:underline text-[10px]">#${q.pr}</a>`
      : '';
    const issueLink = q.issue
      ? `<a href="https://github.com/${q.repo}/issues/${q.issue}" target="_blank" class="text-text-sec hover:text-accent text-[10px]">#${q.issue}</a>`
      : '';

    return `<div class="${rowClass} rounded px-3 py-2">
      <div class="flex items-center justify-between gap-2">
        <div class="flex items-center gap-2 min-w-0">
          ${issueLink}
          <span class="text-xs text-text-pri truncate">${q.title}</span>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          ${prLink}
          ${queueStatusBadge(q.status)}
        </div>
      </div>
    </div>`;
  }).join('');

  // Update toggle button
  const btn = document.getElementById('toggle-completed');
  if (completed.length > 0) {
    btn.style.display = '';
    btn.textContent = showCompleted ? `Hide completed (${completed.length})` : `Show completed (${completed.length})`;
  } else {
    btn.style.display = 'none';
  }
}

function formatTokens(n) {
  if (n == null) return '—';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return n.toLocaleString();
}

function renderUsage(usage) {
  const panel = document.getElementById('usage-panel');
  if (!usage) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = '';
  document.getElementById('cost-today').textContent = '$' + (usage.cost_today_usd ?? 0).toFixed(2);
  document.getElementById('cost-week').textContent = '$' + (usage.cost_week_usd ?? 0).toFixed(2);
  document.getElementById('tokens-today-in').textContent = formatTokens(usage.today?.input_tokens);
  document.getElementById('tokens-today-out').textContent = formatTokens(usage.today?.output_tokens);
  document.getElementById('tokens-week-in').textContent = formatTokens(usage.week?.input_tokens);
  document.getElementById('tokens-week-out').textContent = formatTokens(usage.week?.output_tokens);
}

function renderPRs(prs) {
  const container = document.getElementById('pr-list');
  if (!prs || prs.length === 0) {
    container.innerHTML = '<div class="text-text-sec text-xs py-4">No open PRs</div>';
    return;
  }

  container.innerHTML = prs.map(pr => {
    const url = pr.url || `https://github.com/BOS-Development/pinky.tools/pull/${pr.number}`;
    const author = pr.author?.login || '—';
    return `<div class="card-el rounded px-3 py-2.5">
      <div class="flex items-start justify-between gap-2">
        <div class="min-w-0">
          <a href="${url}" target="_blank" class="text-xs text-accent hover:underline font-medium">#${pr.number}</a>
          <span class="text-xs text-text-pri ml-1.5">${pr.title}</span>
          <div class="text-[10px] text-text-sec mt-1">${author} &middot; ${timeAgo(pr.updatedAt || pr.createdAt)}</div>
        </div>
        <div class="shrink-0 mt-0.5">${ciIcon(pr.statusCheckRollup)}</div>
      </div>
    </div>`;
  }).join('');
}

async function fetchStatus() {
  const indicator = document.getElementById('poll-indicator');
  try {
    indicator.classList.remove('bg-text-sec', 'bg-danger');
    indicator.classList.add('bg-accent');
    const resp = await fetch('/status.json?' + Date.now());
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();

    renderAgents(data.agents);
    renderUsage(data.usage);
    renderQueue(data.queue);
    renderPRs(data.prs);

    document.getElementById('last-update').textContent = 'Updated ' + timeAgo(data.generated_at);
    setTimeout(() => {
      indicator.classList.remove('bg-accent');
      indicator.classList.add('bg-success');
    }, 300);
  } catch (e) {
    console.error('Poll failed:', e);
    indicator.classList.remove('bg-accent', 'bg-success');
    indicator.classList.add('bg-danger');
    document.getElementById('last-update').textContent = 'Poll failed';
  }
}

document.getElementById('toggle-completed').addEventListener('click', () => {
  showCompleted = !showCompleted;
  fetchStatus();
});

fetchStatus();
setInterval(fetchStatus, POLL_INTERVAL);
</script>
</body>
</html>
